name: Deploy - Frontend & Backend

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paths filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/deploy.yml'

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Install dependencies
        run: npm install

      - name: Generate environment.prod.ts for GitHub Pages
        env:
          SECRET_API_URL: ${{ secrets.FRONTEND_API_URL }}
          VAR_API_URL: ${{ vars.FRONTEND_API_URL }}
          APP_NAME: BelezaPro
        run: |
          API_URL="$SECRET_API_URL"
          if [ -z "$API_URL" ]; then API_URL="$VAR_API_URL"; fi
          if [ -z "$API_URL" ]; then
            echo "::error::Define FRONTEND_API_URL as a repository Actions variable or secret — full API base URL, e.g. https://your-api.example.com/api/v1 (no trailing slash)."
            exit 1
          fi
          export API_URL
          export USE_HASH_ROUTING=true
          node scripts/docker-build-env.cjs

      - name: Build (GitHub Pages base path)
        run: npm run build:github-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/app/browser

  deploy-pages:
    needs: build-frontend
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  docker-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version number
        id: version
        run: |
          VERSION=$(git rev-list --count HEAD)
          IMAGE_NAME="${{ secrets.DOCKER_IMAGE_NAME }}"
          FULL_TAG="${IMAGE_NAME}:${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$FULL_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    outputs:
      jar-path: ${{ steps.upload-artifact.outputs.artifact-path || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}-${{ hashFiles('backend/**/*.gradle*', 'backend/**/build.gradle*') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build backend (Gradle) (skip tests)
        run: ./gradlew clean build -x test --no-daemon

      - name: Upload build artifact (jar)
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar

  docker-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version number
        id: version-backend
        run: |
          VERSION=$(git rev-list --count HEAD)
          IMAGE_NAME="${{ secrets.BACKEND_DOCKER_IMAGE }}"
          FULL_TAG="${IMAGE_NAME}:${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$FULL_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.version-backend.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max