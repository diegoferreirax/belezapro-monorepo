server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any route that doesn't match a real file serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets get aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must never be cached (ensures new deploys are picked up)
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
