@if (isOpen) {
<div class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200 flex flex-col transform transition-all">
    
    <!-- Header -->
    <div class="p-6 border-b flex items-start gap-4 relative"
      [ngClass]="confirmColor === 'rose' ? 'bg-rose-50 border-rose-100' : 'bg-stone-50 border-stone-100'">
      <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0"
        [ngClass]="confirmColor === 'rose' ? 'bg-rose-100 text-rose-600' : 'bg-stone-200 text-stone-600'">
        <mat-icon class="text-3xl w-8 h-8 flex items-center justify-center">{{ icon }}</mat-icon>
      </div>
      <div class="flex-1 pt-1">
        <h3 class="text-xl font-serif italic"
          [ngClass]="confirmColor === 'rose' ? 'text-rose-900' : 'text-stone-900'">{{ title }}</h3>
        @if (subtitle) {
          <p class="text-sm mt-1"
            [ngClass]="confirmColor === 'rose' ? 'text-rose-700/80' : 'text-stone-700/80'">{{ subtitle }}</p>
        }
      </div>
      <button (click)="closeModal()" class="absolute top-6 right-6 transition-colors"
        [ngClass]="confirmColor === 'rose' ? 'text-rose-400 hover:text-rose-600' : 'text-stone-400 hover:text-stone-600'">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6">
      <p class="text-stone-600 mb-4 text-base" [innerHTML]="message"></p>
      
      @if (warningMessage) {
      <div class="bg-stone-50 rounded-2xl p-4 mb-8 border border-stone-100 flex gap-3 items-start">
        <mat-icon class="text-stone-400 shrink-0">info</mat-icon>
        <p class="text-stone-500 text-sm leading-relaxed">{{ warningMessage }}</p>
      </div>
      }

      <!-- Actions -->
      <div class="flex justify-end gap-3">
        <button (click)="closeModal()" class="px-6 py-2.5 rounded-full border border-stone-200 text-stone-600 hover:bg-stone-50 transition-colors font-medium">
          {{ cancelText }}
        </button>
        <button (click)="confirmAction()" 
          class="px-6 py-2.5 rounded-full text-white transition-colors shadow-lg font-medium flex items-center gap-2"
          [ngClass]="confirmColor === 'rose' ? 'bg-rose-500 hover:bg-rose-600 shadow-rose-500/30' : 'bg-stone-800 hover:bg-stone-900 shadow-stone-800/30'">
          @if (confirmColor === 'rose') {
            <mat-icon class="text-sm">delete_forever</mat-icon>
          } @else {
            <mat-icon class="text-sm">check</mat-icon>
          }
          {{ confirmText }}
        </button>
      </div>
    </div>
  </div>
</div>
}
