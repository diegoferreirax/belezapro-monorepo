@if (isOpen) {
<div
  class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4"
>
  <div
    class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200"
  >
    <div
      class="p-6 border-b border-stone-100 flex justify-between items-center"
    >
      <h3 class="text-xl font-serif italic">
        {{ service ? 'Editar' : 'Novo' }} Serviço
      </h3>
      <button
        (click)="closeModal()"
        class="text-stone-400 hover:text-stone-600"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <form
      [formGroup]="serviceForm"
      (ngSubmit)="saveService()"
      class="p-6 space-y-4"
    >
      <div>
        <label
          for="service-name"
          class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1"
          >Nome do Serviço</label
        >
        <input
          id="service-name"
          formControlName="name"
          type="text"
          class="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:border-stone-300 transition-colors"
          placeholder="Ex: Manicure Simples"
        />
        @if (serviceForm.get('name')?.invalid &&
        serviceForm.get('name')?.touched) {
        <p class="text-xs text-rose-500 mt-1">
          Nome é obrigatório (mín. 3 caracteres)
        </p>
        }
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label
            for="service-price"
            class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1"
            >Preço (R$)</label
          >
          <input
            id="service-price"
            formControlName="price"
            type="number"
            class="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:border-stone-300 transition-colors"
          />
        </div>
        <div>
          <label
            for="service-duration"
            class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1"
            >Duração</label
          >
          <select
            id="service-duration"
            formControlName="durationMinutes"
            class="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:border-stone-300 transition-colors appearance-none cursor-pointer"
          >
            @for (duration of durationOptions; track duration) {
            <option [value]="duration">
              {{ duration | durationFormat }}
            </option>
            }
          </select>
        </div>
      </div>

      <div class="flex items-center gap-3 p-3 bg-stone-50 rounded-xl">
        <input
          formControlName="isActive"
          type="checkbox"
          id="isActive"
          class="w-5 h-5 accent-stone-800"
        />
        <label for="isActive" class="text-sm text-stone-600 cursor-pointer"
          >Serviço Ativo</label
        >
      </div>

      <div class="pt-4 flex gap-3">
        <button
          type="button"
          (click)="closeModal()"
          class="flex-1 py-3 border border-stone-200 rounded-xl hover:bg-stone-50 transition-colors"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="serviceForm.invalid"
          class="flex-1 py-3 bg-stone-800 text-white rounded-xl hover:bg-stone-700 disabled:opacity-50 transition-colors"
        >
          Salvar
        </button>
      </div>
    </form>
  </div>
</div>
}
