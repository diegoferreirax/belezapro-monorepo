@if (isOpen) {
<app-modal-shell backdrop="muted" size="md">
    <div
      class="p-6 border-b border-stone-100 flex justify-between items-center"
    >
      <h3 class="text-xl font-serif italic">
        {{ service ? 'Editar' : 'Novo' }} Serviço
      </h3>
      <button
        (click)="closeModal()"
        class="text-stone-400 hover:text-stone-600"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <form
      [formGroup]="serviceForm"
      (ngSubmit)="saveService()"
      class="p-6 space-y-4"
    >
      <div>
        <label
          for="service-name"
          class="bp-field-label"
          >Nome do Serviço</label
        >
        <input
          id="service-name"
          formControlName="name"
          type="text"
          class="bp-input"
          placeholder="Ex: Manicure Simples"
        />
        @if (serviceForm.get('name')?.invalid &&
        serviceForm.get('name')?.touched) {
        <p class="text-xs text-rose-500 mt-1">
          Nome é obrigatório (mín. 3 caracteres)
        </p>
        }
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label
            for="service-price"
            class="bp-field-label"
            >Preço (R$)</label
          >
          <input
            id="service-price"
            formControlName="price"
            type="number"
            class="bp-input"
          />
        </div>
        <div>
          <label
            for="service-duration"
            class="bp-field-label"
            >Duração</label
          >
          <select
            id="service-duration"
            formControlName="durationMinutes"
            class="bp-input appearance-none cursor-pointer"
          >
            @for (duration of durationOptions; track duration) {
            <option [value]="duration">
              {{ duration | durationFormat }}
            </option>
            }
          </select>
        </div>
      </div>

      <div class="flex items-center gap-3 p-3 bg-surface-muted rounded-control-lg">
        <input
          formControlName="isActive"
          type="checkbox"
          id="isActive"
          class="w-5 h-5 accent-stone-800"
        />
        <label for="isActive" class="text-sm text-text-body cursor-pointer"
          >Serviço Ativo</label
        >
      </div>

      <div class="pt-4 flex gap-3">
        <button
          type="button"
          (click)="closeModal()"
          class="bp-btn-modal-secondary"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="serviceForm.invalid"
          class="bp-btn-modal-primary"
        >
          Salvar
        </button>
      </div>
    </form>
</app-modal-shell>
}
