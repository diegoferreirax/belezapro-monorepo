@if (isOpen) {
  <app-modal-shell backdrop="muted" size="md">
      <div class="p-6 border-b border-stone-100 flex justify-between items-center">
        <h3 class="text-xl font-serif italic">{{ expense ? 'Editar' : 'Nova' }} Despesa</h3>
        <button (click)="closeModal()" class="text-stone-400 hover:text-stone-600">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      
      <form [formGroup]="expenseForm" (ngSubmit)="saveExpense()" class="p-6 space-y-4">
        <div>
          <label for="expense-description" class="bp-field-label">Descrição</label>
          <input id="expense-description" formControlName="description" type="text" class="bp-input" placeholder="Ex: Compra de Esmaltes">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="expense-amount" class="bp-field-label">Valor (R$)</label>
            <input id="expense-amount" formControlName="amount" type="number" step="0.01" inputmode="decimal" class="bp-input" placeholder="0,00">
          </div>
          <div>
            <label for="expense-date" class="bp-field-label">Data</label>
            <input id="expense-date" formControlName="date" type="date" class="bp-input">
          </div>
        </div>

        <div>
          <span class="bp-field-label">Categoria</span>
          <div class="flex flex-wrap gap-2">
            @for (cat of categories; track cat) {
              <button type="button" 
                      (click)="expenseForm.patchValue({category: cat})"
                      [class]="expenseForm.get('category')?.value === cat ? 'bg-stone-800 text-white' : 'bg-stone-50 text-stone-500 border-stone-100'"
                      class="px-4 py-2 rounded-full text-xs font-medium border transition-all">
                {{ cat }}
              </button>
            }
          </div>
        </div>

        <div class="flex items-center gap-3 p-3 bg-surface-muted rounded-control-lg border border-border-soft">
          <input id="is-paid" formControlName="isPaid" type="checkbox" class="w-5 h-5 rounded border-stone-300 text-stone-800 focus:ring-stone-500">
          <label for="is-paid" class="text-sm text-text-body font-medium cursor-pointer">Já está paga?</label>
        </div>

        <div class="pt-4 flex gap-3">
          <button type="button" (click)="closeModal()" class="bp-btn-modal-secondary">Cancelar</button>
          <button type="submit" [disabled]="expenseForm.invalid" class="bp-btn-modal-primary">Salvar</button>
        </div>
      </form>
  </app-modal-shell>
}
