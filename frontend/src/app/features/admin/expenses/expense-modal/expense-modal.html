@if (isOpen) {
  <div class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
      <div class="p-6 border-b border-stone-100 flex justify-between items-center">
        <h3 class="text-xl font-serif italic">{{ expense ? 'Editar' : 'Nova' }} Despesa</h3>
        <button (click)="closeModal()" class="text-stone-400 hover:text-stone-600">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      
      <form [formGroup]="expenseForm" (ngSubmit)="saveExpense()" class="p-6 space-y-4">
        <div>
          <label for="expense-description" class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1">Descrição</label>
          <input id="expense-description" formControlName="description" type="text" class="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:border-stone-300 transition-colors" placeholder="Ex: Compra de Esmaltes">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="expense-amount" class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1">Valor (R$)</label>
            <input id="expense-amount" formControlName="amount" type="number" step="0.01" inputmode="decimal" class="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:border-stone-300 transition-colors" placeholder="0,00">
          </div>
          <div>
            <label for="expense-date" class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1">Data</label>
            <input id="expense-date" formControlName="date" type="date" class="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:border-stone-300 transition-colors">
          </div>
        </div>

        <div>
          <span class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1">Categoria</span>
          <div class="flex flex-wrap gap-2">
            @for (cat of categories; track cat) {
              <button type="button" 
                      (click)="expenseForm.patchValue({category: cat})"
                      [class]="expenseForm.get('category')?.value === cat ? 'bg-stone-800 text-white' : 'bg-stone-50 text-stone-500 border-stone-100'"
                      class="px-4 py-2 rounded-full text-xs font-medium border transition-all">
                {{ cat }}
              </button>
            }
          </div>
        </div>

        <div class="flex items-center gap-3 p-3 bg-stone-50 rounded-xl border border-stone-100">
          <input id="is-paid" formControlName="isPaid" type="checkbox" class="w-5 h-5 rounded border-stone-300 text-stone-800 focus:ring-stone-500">
          <label for="is-paid" class="text-sm text-stone-600 font-medium cursor-pointer">Já está paga?</label>
        </div>

        <div class="pt-4 flex gap-3">
          <button type="button" (click)="closeModal()" class="flex-1 py-3.5 border border-stone-200 rounded-2xl hover:bg-stone-50 transition-colors font-medium">Cancelar</button>
          <button type="submit" [disabled]="expenseForm.invalid" class="flex-1 py-3.5 bg-stone-800 text-white rounded-2xl hover:bg-stone-700 disabled:opacity-50 transition-all shadow-lg shadow-stone-800/20 font-medium">Salvar</button>
        </div>
      </form>
    </div>
  </div>
}
