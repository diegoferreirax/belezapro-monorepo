<div class="min-h-screen flex items-center justify-center p-4 bg-surface-canvas">
  <div
    class="max-w-md w-full p-6 bg-surface-elevated rounded-card shadow-modal-soft border border-border-soft"
  >
    <h2 class="text-2xl font-serif italic text-text-heading mb-6">Login Maria</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label
          for="username"
          class="bp-field-label ml-2"
          >Usuário</label
        >
        <input
          id="username"
          formControlName="username"
          type="text"
          placeholder="maria"
          class="bp-input-lg"
        />
      </div>
      <div>
        <label
          for="password"
          class="bp-field-label ml-2"
          >Senha</label
        >
        <input
          id="password"
          formControlName="password"
          type="password"
          placeholder="••••••••"
          class="bp-input-lg"
        />
      </div>
      <button
        type="submit"
        class="bp-btn-primary-pill"
      >
        Entrar
      </button>
    </form>

    <div class="mt-8 text-center">
      <a
        routerLink="/"
        class="inline-flex items-center justify-center gap-1.5 text-sm text-text-muted hover:text-text-body transition-colors"
      >
        <mat-icon class="text-base">home</mat-icon>
        Ir para a página inicial
      </a>
    </div>
  </div>
</div>
