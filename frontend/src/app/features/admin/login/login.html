<div class="min-h-screen flex items-center justify-center p-4">
  <div
    class="max-w-md w-full p-6 bg-white rounded-3xl shadow-sm border border-stone-100"
  >
    <h2 class="text-2xl font-serif italic text-stone-800 mb-6">Login Maria</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label
          for="username"
          class="text-xs font-bold text-stone-400 uppercase tracking-widest ml-2"
          >Usuário</label
        >
        <input
          id="username"
          formControlName="username"
          type="text"
          placeholder="maria"
          class="w-full p-4 mt-1 bg-stone-50 border border-stone-100 rounded-2xl focus:outline-none focus:border-stone-300 transition-colors"
        />
      </div>
      <div>
        <label
          for="password"
          class="text-xs font-bold text-stone-400 uppercase tracking-widest ml-2"
          >Senha</label
        >
        <input
          id="password"
          formControlName="password"
          type="password"
          placeholder="••••••••"
          class="w-full p-4 mt-1 bg-stone-50 border border-stone-100 rounded-2xl focus:outline-none focus:border-stone-300 transition-colors"
        />
      </div>
      <button
        type="submit"
        class="w-full bg-stone-800 text-white p-4 rounded-full hover:bg-stone-700 transition-all"
      >
        Entrar
      </button>
    </form>

    <div class="mt-8 text-center">
      <a
        routerLink="/"
        class="inline-flex items-center justify-center gap-1.5 text-sm text-stone-400 hover:text-stone-600 transition-colors"
      >
        <mat-icon class="text-base">home</mat-icon>
        Ir para a página inicial
      </a>
    </div>
  </div>
</div>
