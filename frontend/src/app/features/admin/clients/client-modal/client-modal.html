@if (isOpen) {
  <app-modal-shell backdrop="muted" size="md">
      <div class="p-6 border-b border-stone-100 flex justify-between items-center">
        <h3 class="text-xl font-serif italic">{{ client ? 'Editar' : 'Novo' }} Cliente</h3>
        <button (click)="closeModal()" class="text-stone-400 hover:text-stone-600">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      
      <form [formGroup]="clientForm" (ngSubmit)="saveClient()" class="p-6 space-y-4">
        <div>
          <label for="client-name" class="bp-field-label">Nome Completo</label>
          <input id="client-name" formControlName="name" type="text" class="bp-input" placeholder="Nome do cliente">
        </div>

        <div>
          <label for="client-email" class="bp-field-label">E-mail</label>
          <input appEmailMask id="client-email" formControlName="email" type="email" 
                 class="bp-input" 
                 [class.border-red-500]="isEmailInvalid()"
                 [class.focus:border-red-500]="isEmailInvalid()"
                 placeholder="email@exemplo.com">
          @if (isEmailInvalid()) {
            <span class="text-red-500 text-xs mt-1 ml-1 block">
              {{ getEmailErrorMessage() }}
            </span>
          }
        </div>

        <div>
          <label for="client-phone" class="bp-field-label">Telefone / WhatsApp</label>
          <input id="client-phone" formControlName="phone" type="text" class="bp-input" placeholder="(00) 00000-0000">
        </div>

        <div class="pt-4 flex gap-3">
          <button type="button" (click)="closeModal()" class="bp-btn-modal-secondary">Cancelar</button>
          <button type="submit" [disabled]="clientForm.invalid" class="bp-btn-modal-primary">Salvar</button>
        </div>
      </form>
  </app-modal-shell>
}
