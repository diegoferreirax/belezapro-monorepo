@if (isOpen) {
  <div class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
      <div class="p-6 border-b border-stone-100 flex justify-between items-center">
        <h3 class="text-xl font-serif italic">{{ client ? 'Editar' : 'Novo' }} Cliente</h3>
        <button (click)="closeModal()" class="text-stone-400 hover:text-stone-600">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      
      <form [formGroup]="clientForm" (ngSubmit)="saveClient()" class="p-6 space-y-4">
        <div>
          <label for="client-name" class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1">Nome Completo</label>
          <input id="client-name" formControlName="name" type="text" class="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:border-stone-300 transition-colors" placeholder="Nome do cliente">
        </div>

        <div>
          <label for="client-email" class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1">E-mail</label>
          <input appEmailMask id="client-email" formControlName="email" type="email" 
                 class="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:border-stone-300 transition-colors" 
                 [class.border-red-500]="isEmailInvalid()"
                 [class.focus:border-red-500]="isEmailInvalid()"
                 placeholder="email@exemplo.com">
          @if (isEmailInvalid()) {
            <span class="text-red-500 text-xs mt-1 ml-1 block">
              {{ getEmailErrorMessage() }}
            </span>
          }
        </div>

        <div>
          <label for="client-phone" class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-1">Telefone / WhatsApp</label>
          <input id="client-phone" formControlName="phone" type="text" class="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:border-stone-300 transition-colors" placeholder="(00) 00000-0000">
        </div>

        <div class="pt-4 flex gap-3">
          <button type="button" (click)="closeModal()" class="flex-1 py-3 border border-stone-200 rounded-xl hover:bg-stone-50 transition-colors">Cancelar</button>
          <button type="submit" [disabled]="clientForm.invalid" class="flex-1 py-3 bg-stone-800 text-white rounded-xl hover:bg-stone-700 disabled:opacity-50 transition-colors">Salvar</button>
        </div>
      </form>
    </div>
  </div>
}
