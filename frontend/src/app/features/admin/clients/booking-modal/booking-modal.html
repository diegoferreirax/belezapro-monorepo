@if (isOpen) {
  <app-modal-shell backdrop="muted" size="lg" [tall]="true">
      <div class="p-6 border-b border-stone-100 flex justify-between items-center shrink-0">
        <h3 class="text-xl font-serif italic">Novo Agendamento</h3>
        <button (click)="closeModal()" class="text-stone-400 hover:text-stone-600">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="flex-1 overflow-auto p-6">
        <app-booking-form [selectedClient]="client" mode="admin" (finished)="onFinished()"></app-booking-form>
      </div>
  </app-modal-shell>
}
