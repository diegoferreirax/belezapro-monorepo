@if (isOpen) {
  <div class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] animate-in fade-in zoom-in duration-200 flex flex-col">
      <div class="p-6 border-b border-stone-100 flex justify-between items-center shrink-0">
        <h3 class="text-xl font-serif italic">{{ editAppointmentId ? 'Reagendar Horário' : 'Novo Agendamento' }}</h3>
        <button (click)="closeModal()" class="text-stone-400 hover:text-stone-600">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="flex-1 overflow-auto p-6">
        <app-booking-form mode="client" [editAppointmentId]="editAppointmentId" (finished)="onFinished()"></app-booking-form>
      </div>
    </div>
  </div>
}
