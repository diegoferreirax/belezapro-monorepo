<div
  class="h-screen w-full bg-surface-canvas flex flex-col md:flex-row overflow-hidden"
>
  @if (menu.menuOpen()) {
    <div
      class="fixed inset-0 z-40 bg-stone-900/40 md:hidden"
      (click)="menu.closeMenu()"
      (keydown.escape)="menu.closeMenu()"
      aria-hidden="true"
    ></div>
  }

  <button
    type="button"
    class="fixed top-4 left-4 z-[60] md:hidden flex items-center justify-center size-11 rounded-xl bg-white border border-stone-200 text-stone-700 shadow-sm"
    (click)="menu.toggleMenu()"
    [attr.aria-expanded]="menu.menuOpen()"
    [attr.aria-label]="menu.menuOpen() ? 'Fechar menu' : 'Abrir menu'"
  >
    <mat-icon>{{ menu.menuOpen() ? 'close' : 'menu' }}</mat-icon>
  </button>

  <!-- Sidebar -->
  <aside
    class="w-64 max-w-[min(100vw,20rem)] shrink-0 bg-surface-elevated border-r border-border-subtle flex flex-col overflow-y-auto md:overflow-visible
      fixed md:static inset-y-0 left-0 z-50 md:z-auto
      transform transition-transform duration-200 ease-out
      md:translate-x-0 shadow-xl md:shadow-none"
    [ngClass]="menu.menuOpen() ? 'translate-x-0' : '-translate-x-full'"
  >
    <div class="p-6 border-b border-border-soft shrink-0">
      <h1 class="text-xl font-serif italic text-text-heading">BelezaPro</h1>
      <p class="text-xs text-text-muted uppercase tracking-widest mt-1">
        Área do Cliente
      </p>
    </div>

    <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
      <a
        routerLink="appointments"
        routerLinkActive="bp-nav-link-active"
        class="bp-nav-link"
        (click)="menu.closeMenu()"
      >
        <mat-icon>calendar_today</mat-icon>
        <span>Agendamentos</span>
      </a>
    </nav>

    <div class="p-4 border-t border-border-soft shrink-0">
      <button
        type="button"
        (click)="logout()"
        class="w-full flex items-center gap-3 p-3 rounded-control-lg text-text-muted hover:text-red-600 transition-colors text-sm"
      >
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-4 pt-20 md:p-8 md:pt-8 overflow-y-auto">
    <router-outlet></router-outlet>
  </main>
</div>
