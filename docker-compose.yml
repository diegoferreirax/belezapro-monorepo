version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: belezapro_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root123
      - MONGO_INITDB_DATABASE=belezapro_db
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "mongodb://root:root123@127.0.0.1:27017/admin", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  api:
    build: backend/.
    image: belezapro-api:latest
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_MONGODB_URI=mongodb://root:root123@mongodb:27017/belezapro_db?authSource=admin
      - SPRING_DATA_MONGODB_AUTO_INDEX_CREATION=true
      - JWT_SECRET=changeit-secret
      - SPRING_MAIL_HOST=localhost
      - SPRING_MAIL_PORT=1025
      - CORS_ALLOWED_ORIGINS=http://localhost:4200
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
  
  web:
    build: frontend/.
    image: belezapro-web:latest
    ports:
      - "4200:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

volumes:
  mongodb_data:
